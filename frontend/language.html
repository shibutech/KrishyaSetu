<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Selection - KrishyaSetu</title>
    <link rel="manifest" href="pwa/manifest.json">
    <meta name="theme-color" content="#16a34a">
    <link rel="stylesheet" href="css/krishyasetu.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .onboarding-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg-page);
            padding: 20px;
        }

        .onboarding-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 32px 24px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 8px 32px var(--shadow);
            text-align: center;
        }

        .onboarding-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 20px;
            color: white;
            box-shadow: 0 4px 16px rgba(22, 163, 74, 0.3);
        }

        .onboarding-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .onboarding-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .language-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }

        .language-card {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 14px;
            min-height: 48px;
        }

        .language-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.15);
        }

        .language-card.selected {
            border-color: var(--accent);
            background: rgba(22, 163, 74, 0.08);
        }

        .language-icon {
            width: 28px;
            height: 28px;
            background: rgba(22, 163, 74, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .language-card:hover .language-icon {
            transform: scale(1.05);
            background: rgba(22, 163, 74, 0.15);
        }

        .language-card.selected .language-icon {
            transform: scale(1.05);
            background: var(--accent);
            color: white;
        }

        .language-icon.indian {
            background: linear-gradient(135deg, #ff9933, #ffffff, #138808);
            position: relative;
            overflow: hidden;
        }

        .language-icon.indian::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            background: radial-gradient(circle, #0000ff 30%, transparent 30%);
            border-radius: 50%;
        }

        .language-icon.indian::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background: #ff9933;
            border-radius: 50%;
        }

        .language-card:hover .language-icon {
            transform: scale(1.05);
            background: rgba(22, 163, 74, 0.15);
        }

        .language-card.selected .language-icon {
            transform: scale(1.05);
            background: var(--accent);
            color: white;
        }

        .language-card.selected .language-icon.indian {
            background: linear-gradient(135deg, #ff9933, #ffffff, #138808);
        }

        .language-info {
            flex: 1;
            text-align: left;
        }

        .language-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .continue-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.2);
            margin-top: 16px;
        }

        .continue-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(22, 163, 74, 0.3);
        }

        .continue-btn:disabled {
            background: var(--border);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        @media (max-width: 480px) {
            .onboarding-card {
                padding: 24px 20px;
                max-width: 350px;
            }

            .language-card {
                padding: 10px 16px;
                min-height: 45px;
            }

            .language-icon {
                width: 28px;
                height: 28px;
                font-size: 18px;
            }

            .language-name {
                font-size: 15px;
            }

            .continue-btn {
                padding: 16px;
                font-size: 15px;
            }
        }
    </style>
</head>

<body>
    <div class="onboarding-container">
        <div class="onboarding-card">
            <div class="onboarding-logo" style="background: transparent;">
                <img src="pwa/icons/krishyasetu.png" alt="Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit;">
            </div>
            <h1 class="onboarding-title">Choose Your Language</h1>
            <p class="onboarding-subtitle">Select your preferred language to continue</p>

            <div class="language-grid">
                <div class="language-card" data-lang="en">
                    <div class="language-icon">🌍</div>
                    <div class="language-info">
                        <div class="language-name">English</div>
                    </div>
                </div>

                <div class="language-card" data-lang="hi">
                    <div class="language-icon indian"></div>
                    <div class="language-info">
                        <div class="language-name">Hindi</div>
                    </div>
                </div>

                <div class="language-card" data-lang="mr">
                    <div class="language-icon indian"></div>
                    <div class="language-info">
                        <div class="language-name">Marathi</div>
                    </div>
                </div>

                <div class="language-card" data-lang="bn">
                    <div class="language-icon indian"></div>
                    <div class="language-info">
                        <div class="language-name">Bengali</div>
                    </div>
                </div>

                <div class="language-card" data-lang="pa">
                    <div class="language-icon indian"></div>
                    <div class="language-info">
                        <div class="language-name">Punjabi</div>
                    </div>
                </div>

                <div class="language-card" data-lang="ch">
                    <div class="language-icon indian"></div>
                    <div class="language-info">
                        <div class="language-name">Chhattisgarhi</div>
                    </div>
                </div>
            </div>

            <button class="continue-btn" id="continueBtn" disabled>Continue</button>
        </div>
    </div>

    <script>
        let selectedLanguage = null;

        // Check if this is a fresh start or refresh
        const hasCompletedOnboarding = localStorage.getItem('onboardingCompleted');
        const hasUserProfile = localStorage.getItem('userProfile');
        const hasPermissions = localStorage.getItem('permissionsGranted');

        // Language card selection
        document.querySelectorAll('.language-card').forEach(card => {
            card.addEventListener('click', () => {
                // Remove previous selection
                document.querySelectorAll('.language-card').forEach(c => c.classList.remove('selected'));

                // Add selection to clicked card
                card.classList.add('selected');
                selectedLanguage = card.getAttribute('data-lang');

                // Enable continue button
                document.getElementById('continueBtn').disabled = false;
            });
        });

        // Continue button
        document.getElementById('continueBtn').addEventListener('click', () => {
            if (selectedLanguage) {
                // Save language to localStorage
                localStorage.setItem('selectedLanguage', selectedLanguage);

                // BUG 25 Fix: Mark onboarding as started so dashboard.html
                // doesn't redirect back to splash on next visit.
                localStorage.setItem('onboardingCompleted', 'true');

                // Redirect to signup page
                window.location.href = 'signup.html';
            }
        });
    </script>
</body>

</html>
