<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrishyaSetu - Smart Farming Assistant</title>
    <link rel="manifest" href="pwa/manifest.json">
    <meta name="theme-color" content="#16a34a">
    <link rel="stylesheet" href="css/krishyasetu.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .splash-container {
            min-height: 100vh;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--accent) 0%, #22c55e 100%);
            color: white;
            text-align: center;
            padding: 20px;
            position: relative;
            box-sizing: border-box;
        }
        
        .splash-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            max-width: 400px;
        }
        
        .splash-logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #16a34a, #22c55e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 32px;
            color: white;
            animation: logoFloat 3s ease-in-out infinite, logoGlow 2s ease-in-out infinite alternate;
            box-shadow: 0 8px 32px rgba(22, 163, 74, 0.3);
        }
        
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes logoGlow {
            0% { box-shadow: 0 8px 32px rgba(22, 163, 74, 0.3); }
            100% { box-shadow: 0 8px 48px rgba(22, 163, 74, 0.5); }
        }
        
        .splash-title {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: 1px;
            animation: fadeInUp 1s ease-out 0.5s both;
        }
        
        .splash-tagline {
            font-size: 18px;
            font-weight: 500;
            opacity: 0.9;
            margin-bottom: 48px;
            animation: fadeInUp 1s ease-out 0.7s both;
        }
        
        @keyframes fadeInUp {
            0% { 
                opacity: 0;
                transform: translateY(30px);
            }
            100% { 
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .splash-footer {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            font-size: 14px;
            opacity: 0.7;
            animation: fadeInUp 1s ease-out 1.1s both;
            text-align: center;
        }
        
        @media (max-width: 480px) {
            .splash-container {
                padding: 16px;
            }
            
            .splash-content {
                max-width: 300px;
            }
            
            .splash-logo {
                width: 80px;
                height: 80px;
                font-size: 40px;
                margin-bottom: 24px;
            }
            
            .splash-title {
                font-size: 28px;
            }
            
            .splash-tagline {
                font-size: 16px;
                margin-bottom: 32px;
            }
            
            .splash-footer {
                font-size: 12px;
                bottom: 24px;
            }
        }
        
        @media (max-height: 600px) {
            .splash-container {
                padding: 12px;
            }
            
            .splash-logo {
                margin-bottom: 16px;
            }
            
            .splash-tagline {
                margin-bottom: 24px;
            }
            
            .splash-footer {
                bottom: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="splash-content">
            <div class="splash-logo" style="background: transparent;">
                <img src="pwa/icons/krishyasetu.png" alt="Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit;">
            </div>
            <h1 class="splash-title">KrishyaSetu</h1>
            <p class="splash-tagline">Smart Farming Assistant</p>
        </div>
        <div class="splash-footer">Empowering Farmers with Technology</div>
    </div>
    
    <script>
        // Clear localStorage for fresh start (remove this in production)
        // localStorage.clear();
        
        // Auto-redirect to language selection after 2.5 seconds
        setTimeout(() => {
            window.location.href = 'language.html';
        }, 2500);
    </script>
</body>
</html>
