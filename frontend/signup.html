<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Profile - KrishyaSetu</title>
    <link rel="manifest" href="pwa/manifest.json">
    <meta name="theme-color" content="#16a34a">
    <link rel="stylesheet" href="css/krishyasetu.css">
    <script src="js/common.js"></script>
    <script src="js/data/india-states-districts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.0.0/js/all.min.js"></script>
    <style>
        .auth-options {
            text-align: center;
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .auth-option {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px;
            margin-bottom: 12px;
            border: 2px solid var(--border);
            border-radius: 16px;
            background: var(--bg-input);
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        
        .auth-option:hover {
            border-color: var(--accent);
            background: var(--accent-light-bg);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(22, 163, 74, 0.1);
        }
        
        .auth-option.primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.2);
        }
        
        .auth-option.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(22, 163, 74, 0.3);
        }
        
        .onboarding-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg-page);
            padding: 20px;
            position: relative;
        }
        
        .onboarding-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 32px 24px;
            max-width: 800px;
            width: 90%;
            box-shadow: 0 8px 32px var(--shadow);
            position: relative;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 16px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .back-btn:hover {
            background: var(--accent-light-bg);
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .onboarding-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .onboarding-logo {
            width: 80px;
            height: 80px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 24px;
            color: white;
        }
        
        .onboarding-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .onboarding-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        
        @media (min-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .form-input, .form-select {
            width: 100%;
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            background: var(--bg-input);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-light-bg);
        }
        
        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }
        
        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 2px solid var(--border);
        }
        
        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .progress-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 32px;
        }
        
        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .progress-dot.active {
            background: var(--accent);
            width: 24px;
            border-radius: 4px;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 0 16px;
            }
            
            .onboarding-container {
                padding: 16px;
            }
            
            .onboarding-card {
                padding: 20px;
                margin-bottom: 16px;
            }
            
            .form-group {
                margin-bottom: 16px;
            }
            
            .form-input, .form-select {
                font-size: 16px;
                padding: 12px;
            }
            
            .btn {
                padding: 12px 20px;
                font-size: 16px;
            }
            
            .progress-steps {
                font-size: 14px;
            }
            
            .step-indicator {
                width: 24px;
                height: 24px;
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 12px;
            }
            
            .onboarding-container {
                padding: 12px;
            }
            
            .onboarding-card {
                padding: 16px;
            }
            
            .form-input, .form-select {
                font-size: 16px;
                padding: 14px;
            }
            
            .btn {
                padding: 14px 24px;
                font-size: 16px;
            }
            
            .location-input-group {
                flex-direction: column;
                gap: 12px;
            }
            
            .btn-secondary {
                width: 100%;
            }
        }
    
        .form-actions {
            flex-direction: column;
        }
        
        .location-input-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        
        .location-divider {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }
        
        .manual-location-text {
            color: var(--text-secondary);
            font-size: 14px;
            font-style: italic;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            min-height: auto;
        }
        
        .location-loading {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            font-size: 12px;
            margin-top: 8px;
        }
        
        .location-loading i {
            animation: spin 1s linear infinite;
        }
        
        .location-error {
            color: var(--error);
            font-size: 12px;
            margin-top: 8px;
        }
        
        .location-success {
            color: var(--success);
            font-size: 12px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="onboarding-container">
        <div class="onboarding-card">
            <a href="javascript:void(0)" class="back-btn" id="backBtn">
                <i class="fas fa-arrow-left"></i>
                Back
            </a>
            
            <div class="progress-indicator">
                <div class="progress-dot"></div>
                <div class="progress-dot active"></div>
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
            </div>
            
            <div class="onboarding-header">
                <div class="onboarding-logo" style="background: transparent;">
                    <img src="pwa/icons/krishyasetu.png" alt="Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit;">
                </div>
                <h1 class="onboarding-title">Welcome to KrishyaSetu</h1>
                <p class="onboarding-subtitle">Choose how you'd like to continue</p>
            </div>
            
            <div class="auth-options">
                <button class="auth-option primary" id="createAccountBtn">
                    <i class="fas fa-user-plus"></i> Create New Account
                </button>
                <button class="auth-option" id="signinBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
                <button class="auth-option" id="continueWithoutLoginBtn">
                    <i class="fas fa-arrow-right"></i> Continue Without Login
                </button>
            </div>
            
            <form id="profileForm" style="display: none;" class="animate-fade-in">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="farmerName">Your Name</label>
                        <input type="text" class="form-input input-accessible" id="farmerName" placeholder="Enter your full name" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="farmerMobile">Mobile Number</label>
                        <input type="tel" class="form-input input-accessible" id="farmerMobile" placeholder="Enter your mobile number" required>
                    </div>
                    
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label class="form-label">Location</label>
                        <div class="location-input-group">
                            <button type="button" class="btn btn-secondary btn-sm touch-target" id="useCurrentLocationBtn">
                                <i class="fas fa-location-dot"></i> Use Current Location
                            </button>
                            <span class="location-divider">or</span>
                            <span class="manual-location-text">select manually below</span>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="farmerState">State</label>
                        <select class="form-select input-accessible" id="farmerState" required>
                            <option value="">Select your state</option>
                            <option value="andaman-nicobar">Andaman & Nicobar Islands</option>
                            <option value="andhra-pradesh">Andhra Pradesh</option>
                            <option value="arunachal-pradesh">Arunachal Pradesh</option>
                            <option value="assam">Assam</option>
                            <option value="bihar">Bihar</option>
                            <option value="chandigarh">Chandigarh</option>
                            <option value="chhattisgarh">Chhattisgarh</option>
                            <option value="dadra-nagar-haveli">Dadra and Nagar Haveli</option>
                            <option value="daman-diu">Daman and Diu</option>
                            <option value="delhi">Delhi</option>
                            <option value="goa">Goa</option>
                            <option value="gujarat">Gujarat</option>
                            <option value="haryana">Haryana</option>
                            <option value="himachal-pradesh">Himachal Pradesh</option>
                            <option value="jammu-kashmir">Jammu & Kashmir</option>
                            <option value="jharkhand">Jharkhand</option>
                            <option value="karnataka">Karnataka</option>
                            <option value="kerala">Kerala</option>
                            <option value="ladakh">Ladakh</option>
                            <option value="lakshadweep">Lakshadweep</option>
                            <option value="madhya-pradesh">Madhya Pradesh</option>
                            <option value="maharashtra">Maharashtra</option>
                            <option value="manipur">Manipur</option>
                            <option value="meghalaya">Meghalaya</option>
                            <option value="mizoram">Mizoram</option>
                            <option value="nagaland">Nagaland</option>
                            <option value="odisha">Odisha</option>
                            <option value="puducherry">Puducherry</option>
                            <option value="punjab">Punjab</option>
                            <option value="rajasthan">Rajasthan</option>
                            <option value="sikkim">Sikkim</option>
                            <option value="tamil-nadu">Tamil Nadu</option>
                            <option value="telangana">Telangana</option>
                            <option value="tripura">Tripura</option>
                            <option value="uttar-pradesh">Uttar Pradesh</option>
                            <option value="uttarakhand">Uttarakhand</option>
                            <option value="west-bengal">West Bengal</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">District</label>
                        <select class="form-select" id="farmerDistrict" required>
                            <option value="">Select your district</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Village</label>
                        <input type="text" class="form-input" id="farmerVillage" placeholder="Enter your village name" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Primary Crop</label>
                        <select class="form-select" id="primaryCrop" required>
                            <option value="">Select your primary crop</option>
                            <option value="wheat">Wheat</option>
                            <option value="rice">Rice</option>
                            <option value="maize">Maize</option>
                            <option value="cotton">Cotton</option>
                            <option value="sugarcane">Sugarcane</option>
                            <option value="pulses">Pulses</option>
                            <option value="vegetables">Vegetables</option>
                            <option value="fruits">Fruits</option>
                            <option value="spices">Spices</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Farm Size (acres)</label>
                        <input type="number" class="form-input" id="farmSize" placeholder="Enter your farm size" min="0.1" step="0.1" required>
                    </div>
                    
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label class="form-label">Farming Experience</label>
                        <select class="form-select" id="farmingExperience" required>
                            <option value="">Select your experience</option>
                            <option value="beginner">Beginner (0-2 years)</option>
                            <option value="intermediate">Intermediate (2-5 years)</option>
                            <option value="experienced">Experienced (5-10 years)</option>
                            <option value="expert">Expert (10+ years)</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="skipBtn">Skip for Now</button>
                    <button type="submit" class="btn btn-primary">Create Profile</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        // Load saved language preference
        const savedLanguage = localStorage.getItem('selectedLanguage') || 'en';
        
        // Track current state
        let isOnFormPage = false;
        
        // State and District functionality
        const stateSelect = document.getElementById('farmerState');
        const districtSelect = document.getElementById('farmerDistrict');
        const useLocationBtn = document.getElementById('useCurrentLocationBtn');
        
        // Current location functionality (API-based)
        useLocationBtn.addEventListener('click', async () => {
            await handleCurrentLocation();
        });
        
        async function handleCurrentLocation() {
            const btn = useLocationBtn;
            const originalContent = btn.innerHTML;
            
            try {
                // Show loading state
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Getting location...';
                btn.disabled = true;
                
                // Get GPS coordinates
                const position = await getCurrentPosition();
                const { latitude, longitude } = position.coords;
                
                // Call reverse geocoding API
                const locationData = await reverseGeocode(latitude, longitude);
                
                if (locationData && locationData.state) {
                    // Set state
                    stateSelect.value = locationData.state;
                    loadDistricts(locationData.state);
                    
                    // Wait for districts to load, then set district
                    setTimeout(() => {
                        if (locationData.district) {
                            districtSelect.value = locationData.district;
                        }
                        
                        // Show success message
                        showLocationMessage(`Location detected: ${locationData.stateName}${locationData.districtName ? ', ' + locationData.districtName : ''}`, 'success');
                    }, 500);
                    
                } else {
                    showLocationMessage('Unable to detect your location in India', 'error');
                }
                
            } catch (error) {
                console.warn('Geolocation error:', error);
                let errorMessage = 'Unable to get your location';
                
                if (error.code === 1) {
                    errorMessage = 'Location access denied. Please enable location permissions.';
                } else if (error.code === 2) {
                    errorMessage = 'Location unavailable. Please try again.';
                } else if (error.code === 3) {
                    errorMessage = 'Location request timed out. Please try again.';
                }
                
                showLocationMessage(errorMessage, 'error');
            } finally {
                // Restore button
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }
        
        // Get current GPS position
        function getCurrentPosition() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error('Geolocation is not supported by this browser'));
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    resolve,
                    reject,
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 300000 // 5 minutes
                    }
                );
            });
        }
        
        // Reverse geocoding using API
        async function reverseGeocode(latitude, longitude) {
            try {
                // Using OpenStreetMap Nominatim API (free)
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=10&addressdetails=1`,
                    {
                        headers: {
                            'User-Agent': 'KrishyaSetu/1.0 (krishyasetu@example.com)'
                        }
                    }
                );
                
                if (!response.ok) {
                    throw new Error('Geocoding API request failed');
                }
                
                const data = await response.json();
                
                // Extract state and district from API response
                const address = data.address;
                
                // Find state in our data
                const stateKey = findStateInData(address);
                if (!stateKey) {
                    return null;
                }
                
                // Get state name
                const stateName = INDIA_STATES_DISTRICTS[stateKey]?.name || stateKey;
                
                // Find district
                const districtKey = findDistrictInData(address, stateKey);
                const districtName = districtKey ? getDistrictName(stateKey, districtKey) : null;
                
                return {
                    state: stateKey,
                    stateName,
                    district: districtKey,
                    districtName,
                    latitude,
                    longitude
                };
                
            } catch (error) {
                console.warn('Reverse geocoding error:', error);
                return null;
            }
        }
        
        // Find state in our data from API response
        function findStateInData(address) {
            const possibleStateNames = [
                address.state,
                address.state_district
            ].filter(Boolean);
            
            for (const stateName of possibleStateNames) {
                for (const [stateKey, stateData] of Object.entries(INDIA_STATES_DISTRICTS)) {
                    if (stateData.name.toLowerCase() === stateName.toLowerCase()) {
                        return stateKey;
                    }
                }
            }
            
            return null;
        }
        
        // Find district in our data from API response
        function findDistrictInData(address, stateKey) {
            const possibleDistrictNames = [
                address.county,
                address.city_district,
                address.district,
                address.town,
                address.village
            ].filter(Boolean);
            
            if (!INDIA_STATES_DISTRICTS[stateKey]) {
                return null;
            }
            
            const districts = INDIA_STATES_DISTRICTS[stateKey].districts;
            
            for (const districtName of possibleDistrictNames) {
                const district = districts.find(d => 
                    d.toLowerCase().includes(districtName.toLowerCase()) ||
                    districtName.toLowerCase().includes(d.toLowerCase())
                );
                
                if (district) {
                    return district.toLowerCase().replace(/\s+/g, '-');
                }
            }
            
            return null;
        }
        
        // Get district name from district key
        function getDistrictName(stateKey, districtKey) {
            if (!districtKey || !INDIA_STATES_DISTRICTS?.[stateKey]) {
                return null;
            }

            const districts = INDIA_STATES_DISTRICTS[stateKey].districts;
            const district = districts.find(d => 
                d.toLowerCase().replace(/\s+/g, '-') === districtKey
            );
            
            return district || districtKey;
        }
        
        function showLocationMessage(message, type) {
            // Remove any existing messages
            const existingMessage = document.querySelector('.location-message');
            if (existingMessage) {
                existingMessage.remove();
            }
            
            // Create message element
            const messageDiv = document.createElement('div');
            messageDiv.className = `location-${type} location-message`;
            messageDiv.textContent = message;
            
            // Insert after the location input group
            const locationGroup = document.querySelector('.location-input-group');
            if (locationGroup) {
                locationGroup.parentNode.insertBefore(messageDiv, locationGroup.nextSibling);
            }
            
            // Auto-remove after 5 seconds
            setTimeout(() => {
                if (messageDiv.parentNode) {
                    messageDiv.remove();
                }
            }, 5000);
        }
        
        // Load districts when state changes
        stateSelect.addEventListener('change', function() {
            const selectedState = this.value;
            loadDistricts(selectedState);
        });
        
        function loadDistricts(stateKey) {
            // Clear current districts
            districtSelect.innerHTML = '<option value="">Select your district</option>';
            
            if (!stateKey || !INDIA_STATES_DISTRICTS[stateKey]) {
                return;
            }
            
            const districts = INDIA_STATES_DISTRICTS[stateKey].districts;
            
            // Sort districts alphabetically
            districts.sort();
            
            // Add district options
            districts.forEach(district => {
                const option = document.createElement('option');
                option.value = district.toLowerCase().replace(/\s+/g, '-');
                option.textContent = district;
                districtSelect.appendChild(option);
            });
        }
        
        // Back button logic
        document.getElementById('backBtn').addEventListener('click', () => {
            if (isOnFormPage) {
                // If on form page, go back to initial options
                resetToInitialOptions();
            } else {
                // If on initial options, go to language page
                window.location.href = 'language.html';
            }
        });
        
        // Function to reset to initial options
        function resetToInitialOptions() {
            document.querySelector('.auth-options').style.display = 'flex';
            document.querySelector('.onboarding-title').textContent = 'Welcome to KrishyaSetu';
            document.querySelector('.onboarding-subtitle').textContent = 'Choose how you\'d like to continue';
            document.getElementById('profileForm').style.display = 'none';
            document.getElementById('profileForm').reset();
            isOnFormPage = false;
            // Reset progress indicator to 2nd step (index 1)
            updateProgressIndicator(1);
        }
        
        // Function to update progress indicator
        function updateProgressIndicator(activeIndex) {
            const dots = document.querySelectorAll('.progress-dot');
            dots.forEach((dot, index) => {
                dot.classList.remove('active');
                if (index === activeIndex) {
                    dot.classList.add('active');
                }
            });
        }
        
        // Show/hide form based on selection
        document.getElementById('createAccountBtn').addEventListener('click', () => {
            document.querySelector('.auth-options').style.display = 'none';
            document.querySelector('.onboarding-title').textContent = 'Create Your Farmer Profile';
            document.querySelector('.onboarding-subtitle').textContent = 'Tell us about yourself for personalized experience';
            document.getElementById('profileForm').style.display = 'block';
            isOnFormPage = true;
            // Update progress indicator to 3rd step (index 2)
            updateProgressIndicator(2);
        });
        
        document.getElementById('signinBtn').addEventListener('click', () => {
            // Update progress indicator to 3rd step (index 2) before redirect
            updateProgressIndicator(2);
            // Redirect to login page
            window.location.href = 'login.html';
        });
        
        document.getElementById('continueWithoutLoginBtn').addEventListener('click', () => {
            // Update progress indicator to 3rd step (index 2) before proceeding
            updateProgressIndicator(2);
            // Set guest mode in localStorage
            localStorage.setItem('userMode', 'guest');
            localStorage.removeItem('userProfile');
            window.location.href = 'permissions.html';
        });
        
        // Form submission
        document.getElementById('profileForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const profileData = {
                name: document.getElementById('farmerName').value,
                state: document.getElementById('farmerState').value,
                district: document.getElementById('farmerDistrict').value,
                village: document.getElementById('farmerVillage').value,
                primaryCrop: document.getElementById('primaryCrop').value,
                farmSize: document.getElementById('farmSize').value,
                createdAt: new Date().toISOString()
            };
            
            // Save profile to localStorage
            localStorage.setItem('userProfile', JSON.stringify(profileData));
            localStorage.setItem('userMode', 'registered');
            localStorage.setItem('userType', 'registered');
            localStorage.setItem('isLoggedIn', 'true');
            
            // Continue to permissions
            window.location.href = 'permissions.html';
        });
        
        // Skip button
        document.getElementById('skipBtn').addEventListener('click', () => {
            // Continue to permissions without saving profile
            localStorage.setItem('userMode', 'guest');
            localStorage.setItem('userType', 'guest');
            localStorage.removeItem('userProfile');
            localStorage.setItem('isLoggedIn', 'false');
            
            window.location.href = 'permissions.html';
        });
    </script>
</body>
</html>
