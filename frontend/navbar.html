    <div class="navbar-container">
        <div class="navbar-brand">
            <div class="navbar-logo" style="background: transparent;">
                <img src="pwa/icons/krishyasetu.png" alt="Logo"
                    style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit;">
            </div>
            <span>KrishyaSetu</span>
        </div>

        <ul class="navbar-links">
            <li><a href="dashboard.html" class="navbar-link">Dashboard</a></li>
            <li><a href="chatbot.html" class="navbar-link">Chatbot</a></li>
            <li><a href="arscan.html" class="navbar-link">AR Scan</a></li>
            <li><a href="soil.html" class="navbar-link">Soil Analysis</a></li>
            <li><a href="pest.html" class="navbar-link">Pest Detection</a></li>
            <li><a href="calendar.html" class="navbar-link">Calendar</a></li>
            <li><a href="market.html" class="navbar-link">Market</a></li>
            <li><a href="reports.html" class="navbar-link">Reports</a></li>
            <li><a href="profile.html" class="navbar-link profile-link">Profile</a></li>
        </ul>

        <div class="navbar-right">
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-sun" id="themeIcon"></i>
            </button>

            <div class="user-profile">
                <div class="user-avatar">👨‍🌾</div>
                <span>Farmer</span>
            </div>
        </div>
    </div>
</nav>

<script>
    // Navbar functionality
    document.addEventListener('DOMContentLoaded', function () {
        // Hide profile link for guest users
        const userMode = localStorage.getItem('userMode');
        const userType = localStorage.getItem('userType');

        if (userMode === 'guest' || userType === 'guest') {
            const profileLink = document.querySelector('.profile-link');
            if (profileLink) {
                profileLink.style.display = 'none';
            }
        }

        // Set active navigation link
        const currentPath = window.location.pathname.split('/').pop();
        const navLinks = document.querySelectorAll('.navbar-link');

        navLinks.forEach(link => {
            if (link.getAttribute('href') === currentPath) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });

        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const html = document.documentElement;

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                const currentTheme = html.getAttribute('data-theme');
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';

                html.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateThemeIcon(newTheme);
            });
        }

        function updateThemeIcon(theme) {
            if (themeIcon) {
                themeIcon.className = theme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
            }
        }
    });
</script>
